<html>
<head>
  <title>💖 MS Publisher Activity 💖</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

    body {
      background: linear-gradient(120deg, #FFD6E0, #FFF1F5, #FFE4EC);
      font-family: 'Poppins', sans-serif;
      overflow-x: hidden;
      position: relative;
      animation: bgMove 15s ease-in-out infinite alternate;
    }

    @keyframes bgMove {
      0% { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }

    h1 {
      color: #C71585;
      text-shadow: 0 0 10px #FFB6C1, 0 0 20px #FF99AA;
      font-size: 2.5em;
      animation: titleGlow 2s ease-in-out infinite alternate;
    }

    @keyframes titleGlow {
      from { text-shadow: 0 0 8px #FFB6C1, 0 0 15px #FF99AA; }
      to { text-shadow: 0 0 20px #FF8DAA, 0 0 35px #FFB7CE; }
    }

    iframe {
      border: 4px solid #FF9BB3;
      border-radius: 25px;
      box-shadow: 0 0 20px #FFB6C1;
      background-color: white;
      animation: frameGlow 4s ease-in-out infinite alternate;
    }

    @keyframes frameGlow {
      from { box-shadow: 0 0 10px #FFB6C1; }
      to { box-shadow: 0 0 30px #FF8DAA; }
    }

    /* Floating sparkles ✨ */
    .sparkle, .heart {
      position: absolute;
      border-radius: 50%;
      opacity: 0.7;
      animation: float 6s infinite ease-in-out;
    }

    .sparkle {
      width: 8px;
      height: 8px;
      background: radial-gradient(circle, #FFB6C1 0%, transparent 70%);
    }

    .heart {
      width: 20px;
      height: 20px;
      background-color: #FF8DAA;
      transform: rotate(-45deg);
      animation: floatHearts 8s infinite ease-in-out;
    }

    .heart::before, .heart::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      background-color: #FF8DAA;
      border-radius: 50%;
    }

    .heart::before { top: -10px; left: 0; }
    .heart::after { left: 10px; top: 0; }

    @keyframes float {
      0% { transform: translateY(0) scale(1); opacity: 0.7; }
      50% { transform: translateY(-25px) scale(1.2); opacity: 1; }
      100% { transform: translateY(0) scale(1); opacity: 0.7; }
    }

    @keyframes floatHearts {
      0% { transform: translateY(0) rotate(-45deg); opacity: 0.7; }
      50% { transform: translateY(-30px) rotate(-45deg); opacity: 1; }
      100% { transform: translateY(0) rotate(-45deg); opacity: 0.7; }
    }
  </style>
</head>

<body>

  <!-- Floating sparkles and hearts ✨💖 -->
  <div class="sparkle" style="top: 60px; left: 120px;"></div>
  <div class="sparkle" style="top: 200px; left: 500px;"></div>
  <div class="sparkle" style="top: 350px; left: 800px;"></div>
  <div class="heart" style="top: 480px; left: 300px;"></div>
  <div class="heart" style="top: 650px; left: 950px;"></div>

  <center>
    <h1>💗 Microsoft Publisher Activity 💗</h1>

    <iframe src="lesson8.pdf" width="90%" height="750"></iframe>
  </center>

</body>
</html>
