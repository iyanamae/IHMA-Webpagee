<html>
<head>
    <title>A Sample JavaScript Program in DHTML</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
            background-color: #FFFFFF;
            transition: background-color 0.5s ease;
            padding-top: 60px;
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
        }

        select {
            padding: 10px 15px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
    </style>

    <script>
        function changeBgColor(color) {
            document.body.style.backgroundColor = color;
        }
    </script>
</head>

<body>
    <h2>Please Choose a Color for Your Background</h2>

    <form>
        <select onchange="changeBgColor(this.value)">
            <option value="#40E0D0">Turquoise</option>
            <option value="#2E8B57">Sea Green</option>
            <option value="#87CEEB">Sky Blue</option>
            <option value="#000000">Black</option>
            <option value="#F4A460">Sandy Brown</option>
            <option value="#FF1493">Deep Pink</option>
            <option value="#000080">Navy Blue</option>
            <option value="#FFFFFF" selected>Snow White</option>
            <option value="#990099">Purple</option>
            <option value="#660000">Deep Red</option>
        </select>
    </form>
</body>
</html>
