<html>
<head>
<title> Lesson 19 mp3 </title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

body {
    background: linear-gradient(to bottom right, #FFC0CB, #FFE4EC);
    text-align: center;
    font-family: 'Poppins', sans-serif;
}

.container {
    background: rgba(255,255,255,0.6);
    width: 60%;
    margin: auto;
    margin-top: 40px;
    padding: 30px;
    border-radius: 25px;
    box-shadow: 0 8px 20px rgba(255,105,180,0.4);
}

h1 {
    font-weight: 600;
    color: #C71585;
}

.song {
    background: #fff0f5;
    margin: 20px;
    padding: 15px;
    border-radius: 20px;
    box-shadow: 0 4px 10px rgba(255,182,193,0.5);
    font-weight: 500;
}
</style>

</head>

<body>

<div class="container">

<h1> Music </h1>

<div class="song">
Sunkissed </br>
<audio controls="controls" height="50px" width="100px">
<source src="sunkissed.mp3" type="audio/mpeg">
<source src="song.ogg" type="audio/ogg">
<embed height="50px" width="100px" src="song.mp3"> <br/>
</audio> </br/>
</div>

<div class="song">
Kalapastangan <br/>

</div>

<div class="song">

</div>

<div class="song">
Iris <br/>

</div>

</div>

</body>
</html>
