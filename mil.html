<html>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

    body {
      background: linear-gradient(120deg, #FFD6E0, #FFF1F5, #FFE4EC);
      font-family: 'Poppins', sans-serif;
      overflow-x: hidden;
      position: relative;
      animation: bgMove 15s ease-in-out infinite alternate;
    }

    @keyframes bgMove {
      0% { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }

    h1 {
      color: #C71585;
      text-shadow: 0 0 10px #FFB6C1, 0 0 20px #FF99AA;
      font-size: 2.5em;
      animation: titleGlow 2s ease-in-out infinite alternate;
    }

    @keyframes titleGlow {
      from { text-shadow: 0 0 8px #FFB6C1, 0 0 15px #FF99AA; }
      to { text-shadow: 0 0 20px #FF8DAA, 0 0 35px #FFB7CE; }
    }

    table {
      border-radius: 25px;
      overflow: hidden;
      border: 5px solid #FFB6C1;
      box-shadow: 0 8px 25px rgba(255, 182, 193, 0.7);
      background: rgba(255, 240, 245, 0.9);
      backdrop-filter: blur(12px);
    }

    td:first-child {
      background: linear-gradient(180deg, #FFB6C1, #FF99AA);
      border-top-left-radius: 25px;
      border-bottom-left-radius: 25px;
      padding: 20px;
    }

    h2 {
      color: white;
      text-shadow: 0 0 10px #FF69B4;
      animation: bounce 3s infinite;
      letter-spacing: 1px;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    a {
      color: #8B004F;
      text-decoration: none;
      display: inline-block;
      font-weight: bold;
      font-size: 1em;
      transition: 0.3s;
      background: linear-gradient(90deg, #FFEAF0, #FFD6E0);
      padding: 10px 20px;
      border-radius: 30px;
      box-shadow: 0 2px 10px rgba(255,182,193,0.6);
      margin: 10px 0;
      border: 2px solid #FFB6C1;
    }

    a:hover {
      color: #FF4081;
      background: linear-gradient(90deg, #FFC0CB, #FFB7CE);
      transform: scale(1.1) rotate(1deg);
      box-shadow: 0 0 20px #FF99AA;
    }

    iframe {
      border: 4px solid #FF9BB3;
      border-radius: 25px;
      box-shadow: 0 0 15px #FFB6C1;
      background-color: white;
      animation: frameGlow 4s ease-in-out infinite alternate;
    }

    @keyframes frameGlow {
      from { box-shadow: 0 0 10px #FFB6C1; }
      to { box-shadow: 0 0 30px #FF8DAA; }
    }
  </style>
</head>

              <a href="group111.pdf" target="lessonframe" onclick="changeTopic('The Disadvatage of ICT')">Group 11</a><br>
	      <a href="group112.pdf" target="lessonframe" onclick="changeTopic('The Disadvatage of ICT')">Group 12</a><br>
            </p>
          </div>
